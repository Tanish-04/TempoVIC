# All paths are relative to the project root (directory containing this file).

paths:
  data_root: "../graph_construction/data/linux"
  test_cases_file: "successfultestcase627foundGT.json"   # relative to data_root
  prebuilt_dir: "temporal_graph"
  save_dir: "checkpoints_627_Seed456"
  graph_mode: "full_graph"

# Phase 1: Deletion-line ranking
phase1:
  epochs: 20
  lr: 0.000005
  bert_lr: 0.00002
  rest_lr: 0.0001
  bert_freeze_bottom_layers: 8
  patience: 10
  max_pairs_per_test: 100
  dropout: 0.1
  max_graphs_per_batch: 41
  focal_gamma: 2.0

# Phase 2: Commit ranking
phase2:
  epochs: 100
  lr: 0.0001 # Tried
  weight_decay: 0.01
  batch_size: 16
  patience: 25
  dropout: 0.1
  gradient_accumulation_steps: 2 # Tried
  temperature: 0.1 # Tried
  label_smoothing: 0.05 # Tried: On 0.1, test improve but train underfit
  top_k_lines: 1 # Tried
  focal_gamma: 2.5 # Tried
  focal_alpha: 0.5 # Tried
  margin: 0.5 # Tried
  margin_weight: 1.0
  hidden_dim: 1536  # Tried
  num_heads: 4 # Tried
  num_commit_transformer_layers: 2  # Tried
  max_commits: 50
  max_temporal_dist: 300
  use_dual_query: True # Tried: True works better
  use_temporal_pe: True

# Shared model architecture
model:
  hidden_dim: 768
  num_gt_layers: 1
  num_heads: 4
  dropout: 0.1
  include_bert: True
  max_nodes_per_graph: 9500
  bert_chunk: 64
  use_temporal_pe: True
  encoder_type: "deepsets" # section_transformer, gat

# Defaults
defaults:
  seed: 456
  gpu_id: 1
  num_workers: 4
  max_nodes_per_batch: 4096
  log_interval: 20
